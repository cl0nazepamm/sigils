<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>sigils — demo</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0b0b0d; overflow: hidden; }
      #stage { touch-action: none; }
      #info {
        position: fixed; left: 12px; bottom: 12px; z-index: 10;
        font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
        color: #8a8a93; pointer-events: none; user-select: none;
      }
      #info b { color: #cfcfd6; }
      #info #stats { color: #6fd0ff; }
      #panel {
        position: fixed; top: 14px; right: 14px; z-index: 20;
        width: min(320px, calc(100vw - 28px)); max-height: calc(100vh - 28px);
        overflow: auto; padding: 14px;
        color: #e9e6dc; background: rgba(14, 14, 15, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px; backdrop-filter: blur(14px);
        box-shadow: 0 18px 54px rgba(0, 0, 0, 0.42);
        font: 12px/1.35 ui-monospace, Menlo, Consolas, monospace;
      }
      .mode-switch {
        display: grid; grid-template-columns: 58px 1fr; gap: 8px; align-items: center;
        margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.12);
      }
      .mode-switch label { color: #c5c2bb; }
      .mode-switch select {
        width: 100%; box-sizing: border-box; color: #f7f5ef; background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.16); border-radius: 4px; padding: 5px 6px; font: inherit;
      }
      #mode-hint { margin: 0 0 12px; color: #8a8a93; font-size: 11px; line-height: 1.45; }
      .mode-head h2 {
        margin: 0 0 4px; font: 700 13px/1 ui-monospace, Menlo, Consolas, monospace;
        color: #fff; text-transform: uppercase;
      }
      .mode-head .sub { margin: 0 0 12px; color: #6fd0ff; font-size: 11px; }
      .control-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.12); }
      .control-section:first-of-type { margin-top: 0; padding-top: 0; border-top: 0; }
      .section-title { margin: 0 0 10px; color: #9fa0a7; font-weight: 700; }
      .control-row { display: grid; grid-template-columns: 78px 1fr 48px; gap: 8px; align-items: center; margin: 9px 0; }
      .control-row label { color: #c5c2bb; white-space: nowrap; }
      .control-row input[type="range"] { width: 100%; accent-color: #d8d3c8; }
      .control-row input[type="number"], .control-row select {
        width: 100%; box-sizing: border-box; color: #f7f5ef; background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.16); border-radius: 4px; padding: 4px 5px; font: inherit;
      }
      .control-row select { grid-column: 2 / 4; }
      .control-row output { color: #f7f5ef; text-align: right; }
      .control-row.check { grid-template-columns: 78px 1fr; }
      .control-row.check input { justify-self: start; accent-color: #d8d3c8; }
      .buttons { display: flex; gap: 8px; margin-top: 14px; }
      .buttons button {
        flex: 1; padding: 7px 8px; cursor: pointer;
        color: #f7f5ef; background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.18); border-radius: 5px; font: inherit;
      }
      .buttons button:hover { background: rgba(255,255,255,0.16); }
      .note { margin-top: 12px; color: #8a8a93; }
      .control-details { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.12); }
      .control-details summary { cursor: pointer; list-style: none; }
      .control-details summary::-webkit-details-marker { display: none; }
    </style>
  </head>
  <body>
    <div id="panel">
      <div id="mode-panel"></div>
    </div>
    <div id="info"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
